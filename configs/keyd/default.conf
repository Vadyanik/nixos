[ids]
# Применяется ко всем клавиатурам
*

[main]
# AltGr (правый Alt) + hjkl = стрелки (vim-навигация)
# Работает с любыми модификаторами (Ctrl, Shift, etc)
# Можно держать клавишу нажатой

rightalt = layer(arrows)

[arrows:A]
# Слой активируется когда держишь AltGr
# A = активировать слой когда клавиша зажата

h = left
j = down
k = up
l = right
