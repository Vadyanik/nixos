[ids]
# Применяется ко всем клавиатурам
*

[main]
# Оставляем Win (Meta) работать нормально в основном слое
# но добавляем специальное поведение в [meta] секции ниже

[meta]
# Когда держишь Win (Meta) и нажимаешь w, активируется слой arrows
# Win + w + hjkl = стрелки (vim-навигация)
w = layer(arrows)

[arrows:M]
# M = слой активен пока держишь Meta (Win)
# После Win + w можно использовать hjkl как стрелки
# Работает с любыми модификаторами (Ctrl, Shift, etc)

h = left
j = down
k = up
l = right
